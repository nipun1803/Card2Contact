services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-c2c}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-c2c}
      POSTGRES_DB: ${POSTGRES_DB:-card2contact}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-c2c} -d ${POSTGRES_DB:-card2contact}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgres://c2c:c2c@postgres:5432/card2contact}
      SESSION_SECRET: ${SESSION_SECRET}
      # Required — the backend exits at boot without it. See .env.example.
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      # Admin Authentication — OPTIONAL, both or neither. Left unset the admin
      # panel is disabled and /api/admin/* answers 503. The `:-` defaults matter:
      # this file enumerates env vars explicitly (no env_file), so without them
      # the container would never see the config even when .env sets it.
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      # Sentry error tracking — optional, no-op when unset.
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    environment:
      # Vite's dev server inlines VITE_* from process.env at startup — no .env
      # file needed (frontend/.env is dockerignored, so one wouldn't reach the
      # build context anyway). Optional; a no-op in main.tsx when unset.
      VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_PORT:-8080}:80"
    depends_on:
      - backend
      - frontend

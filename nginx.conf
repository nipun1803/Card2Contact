events {}

http {
  server {
    listen 80;

    # Business-card photos from a phone routinely exceed nginx's 1MB default,
    # which would 413 before the request ever reached the backend. Allow up to
    # 10MB (the backend's multer applies the same cap as the enforcing backstop).
    client_max_body_size 10m;

    # M1–M5 API — proxied straight to the backend container.
    location /api/ {
      proxy_pass http://backend:4000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else — the frontend's Vite dev server, including its
    # WebSocket connection for hot module reload.
    location / {
      proxy_pass http://frontend:5173;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}

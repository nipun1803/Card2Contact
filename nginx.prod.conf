events {}

http {
  server {
    listen 80;
    server_name <YOUR_DOMAIN>;

    # Certbot's HTTP-01 challenge — must stay reachable over plain HTTP so
    # renewal keeps working; everything else is pushed to HTTPS.
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name <YOUR_DOMAIN>;

    # Business-card photos from a phone routinely exceed nginx's 1MB default,
    # which would 413 before the request ever reached the backend. Allow up to
    # 10MB (the backend's multer applies the same cap as the enforcing backstop).
    client_max_body_size 10m;

    ssl_certificate     /etc/letsencrypt/live/<YOUR_DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<YOUR_DOMAIN>/privkey.pem;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # M1–M5 API — proxied straight to the backend container.
    location /api/ {
      proxy_pass http://backend:4000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    # The frontend's own nginx serves the built static bundle.
    location / {
      proxy_pass http://frontend:80;
      proxy_set_header Host $host;
    }
  }
}

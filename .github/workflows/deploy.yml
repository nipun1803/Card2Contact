name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  BACKEND_IMAGE: nipun17572/card2contact-backend
  FRONTEND_IMAGE: nipun17572/card2contact-frontend

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - working-directory: backend
        run: |
          npm ci
          npm run typecheck
          npm run test:unit

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm run build

  build-and-push:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: prod
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH with health check and auto-rollback
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail
            cd /opt/card2contact

            PREV_TAG=$(cat .deployed_tag 2>/dev/null || echo latest)
            NEW_TAG=${{ github.sha }}

            health_check() {
              for i in $(seq 1 30); do
                if curl -sf http://localhost/api/health > /dev/null; then
                  return 0
                fi
                echo "Waiting for health check... ($i/30)"
                sleep 2
              done
              return 1
            }

            echo "Deploying tag: $NEW_TAG (previous: $PREV_TAG)"
            export TAG=$NEW_TAG
            docker compose -f docker-compose.prod.yml pull backend frontend
            docker compose -f docker-compose.prod.yml up -d

            if health_check; then
              echo "$NEW_TAG" > .deployed_tag
              echo "Deploy succeeded — cleaning up old images"
              docker image prune -f
              # Keep the 5 most recent tagged backend/frontend images, remove the rest.
              docker images "${{ env.BACKEND_IMAGE }}" --format '{{.Tag}}' | grep -v latest | sort -r | tail -n +6 | xargs -r -I {} docker rmi "${{ env.BACKEND_IMAGE }}:{}" || true
              docker images "${{ env.FRONTEND_IMAGE }}" --format '{{.Tag}}' | grep -v latest | sort -r | tail -n +6 | xargs -r -I {} docker rmi "${{ env.FRONTEND_IMAGE }}:{}" || true
            else
              echo "Health check failed — rolling back to $PREV_TAG"
              export TAG=$PREV_TAG
              docker compose -f docker-compose.prod.yml up -d
              if health_check; then
                echo "Rollback to $PREV_TAG succeeded"
              else
                echo "Rollback also failed health check — manual intervention required"
              fi
              exit 1
            fi
